# .swiftlint.yml — MacBatteryGuardian
# SwiftLint configuration. Compatible con SwiftLint 0.55+

disabled_rules:
  - todo                    # Permitir // TODO: durante desarrollo

opt_in_rules:
  - array_init
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_object_literal
  - empty_collection_literal
  - empty_count
  - empty_string
  - enum_case_associated_values_count
  - explicit_init
  - extension_access_modifier
  - fallthrough
  - file_header
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - modifier_order
  - multiline_arguments
  - multiline_function_chains
  - multiline_literal_brackets
  - no_extension_access_modifier
  - no_grouping_extension
  - number_separator
  - object_literal
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_in_static_references
  - private_action
  - private_outlet
  - prohibited_super_call
  - quick_discouraged_call
  - reduce_into
  - return_value_from_void_function
  - sorted_first_last
  - sorted_imports
  - static_operator
  - strict_fileprivate
  - toggle_bool
  - trailing_closure
  - unavailable_function
  - unneeded_parentheses_in_closure_argument
  - vertical_parameter_alignment_on_call
  - yoda_condition

analyzer_rules:
  - unused_declaration
  - unused_import

included:
  - MacBatteryGuardian
  - MacBatteryGuardianHelper

excluded:
  - MacBatteryGuardian/Resources

line_length:
  warning: 120
  error: 160
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 400
  error: 600

type_body_length:
  warning: 300
  error: 450

function_body_length:
  warning: 60
  error: 100

cyclomatic_complexity:
  warning: 10
  error: 20

type_name:
  min_length: 3
  max_length:
    warning: 45
    error: 60

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 45
    error: 60
  excluded:
    - id
    - vm
    - db
    - ok
    - i
    - x
    - y

nesting:
  type_level: 2
  function_level: 5

custom_rules:
  no_print:
    name: "No usar print()"
    regex: '\bprint\s*\('
    message: "Usar OSLog en lugar de print(). Ejemplo: logger.debug(\"mensaje\")."
    severity: warning
