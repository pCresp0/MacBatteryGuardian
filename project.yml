name: MacBatteryGuardian
options:
  bundleIdPrefix: com.macbatteryguardian
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ARCHS: arm64
    ONLY_ACTIVE_ARCH: NO
    DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
    ENABLE_HARDENED_RUNTIME: YES
    SWIFT_STRICT_CONCURRENCY: complete

packages: {}

targets:

  MacBatteryGuardian:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MacBatteryGuardian
        excludes:
          - "**/.DS_Store"
    info:
      path: MacBatteryGuardian/Resources/Info.plist
      properties:
        CFBundleName: MacBatteryGuardian
        CFBundleDisplayName: MacBatteryGuardian
        CFBundleIdentifier: com.macbatteryguardian.app
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundleExecutable: $(EXECUTABLE_NAME)
        CFBundlePackageType: APPL
        NSPrincipalClass: NSApplication
        NSMainStoryboardFile: ""
        LSUIElement: true
        LSMinimumSystemVersion: "14.0"
        NSSupportsAutomaticTermination: false
        NSSupportsSuddenTermination: false
        NSHumanReadableCopyright: "© 2024 MacBatteryGuardian"
        NSUserNotificationAlertStyle: alert
    entitlements:
      path: MacBatteryGuardian/Resources/MacBatteryGuardian.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.get-task-allow: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macbatteryguardian.app
        PRODUCT_NAME: MacBatteryGuardian
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "7699A9R89R"
      Debug:
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        GCC_PREPROCESSOR_DEFINITIONS: "DEBUG=1 $(inherited)"
      Release:
        SWIFT_OPTIMIZATION_LEVEL: "-O"
        SWIFT_COMPILATION_MODE: wholemodule
    dependencies:
      - target: MacBatteryGuardianHelper
        embed: false

  MacBatteryGuardianHelper:
    type: tool
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: MacBatteryGuardianHelper
        excludes:
          - "**/.DS_Store"
    info:
      path: MacBatteryGuardianHelper/Info.plist
      properties:
        CFBundleName: MacBatteryGuardianHelper
        CFBundleIdentifier: com.macbatteryguardian.helper
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0.0"
        CFBundleExecutable: $(EXECUTABLE_NAME)
    entitlements:
      path: MacBatteryGuardianHelper/MacBatteryGuardianHelper.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.macbatteryguardian.helper
        PRODUCT_NAME: MacBatteryGuardianHelper
        INSTALL_PATH: "$(BUILT_PRODUCTS_DIR)/MacBatteryGuardian.app/Contents/Library/LaunchServices"
        SKIP_INSTALL: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "7699A9R89R"
      Debug:
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
      Release:
        SWIFT_OPTIMIZATION_LEVEL: "-O"
        SWIFT_COMPILATION_MODE: wholemodule

schemes:
  MacBatteryGuardian:
    build:
      targets:
        MacBatteryGuardian: all
        MacBatteryGuardianHelper: all
    run:
      config: Debug
      executable: MacBatteryGuardian
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
